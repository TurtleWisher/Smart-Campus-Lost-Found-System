<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Claims - BRACU Lost & Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">BRACU Lost & Found</a>
        <div>
            <a href="found-items.html" class="btn btn-outline-light btn-sm me-2">
                Found Items
            </a>
            <button onclick="logout()" class="btn btn-light btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <h2 class="mb-4">📋 My Submitted Claims</h2>

    <!--
        Starts with loading text
        JavaScript will replace this with real claim cards
    -->
    <div id="claims-container">
        <p class="text-muted">Loading your claims...</p>
    </div>
</div>

<script>

// ══════════════════════════════════════════════════════
// LOAD ALL CLAIMS THE LOGGED-IN USER HAS SUBMITTED
// ══════════════════════════════════════════════════════
async function loadMyClaims() {

    const container = document.getElementById('claims-container');

    try {
        const res = await fetch('/api/claims/my-claims', {
            credentials: 'include'
            // credentials: 'include' sends the session cookie
            // Without it the server returns 401 (not logged in)
        });

        // If server returns 401, user is not logged in
        if (res.status === 401) {
            container.innerHTML = `
                <div class="alert alert-warning">
                    You must <a href="login.html">log in</a> to view your claims.
                </div>`;
            return;
        }

        const claims = await res.json();

        // No claims found for this user
        if (claims.length === 0) {
            container.innerHTML = `
                <div class="alert alert-info">
                    You have not submitted any claims yet.
                    <br>
                    <a href="found-items.html" class="alert-link">
                        Browse found items →
                    </a>
                </div>`;
            return;
        }

        // ── Build a card for each claim ─────────────────
        let html = '';

        for (const claim of claims) {

            // Pick a color for the claim status badge
            const badgeColor = {
                'Pending':  'warning',
                'Approved': 'success',
                'Rejected': 'danger'
            };

            // Pick an icon and message based on claim status
            // This gives the user a clear human-readable update
            let statusMessage = '';
            if (claim.claim_status === 'Pending') {
                statusMessage = `
                    <div class="alert alert-warning py-2 mb-2">
                        ⏳ Your claim is waiting for the finder to review it.
                    </div>`;
            } else if (claim.claim_status === 'Approved') {
                statusMessage = `
                    <div class="alert alert-success py-2 mb-2">
                        🎉 Your claim was approved! Contact the finder to collect your item.
                    </div>`;
            } else if (claim.claim_status === 'Rejected') {
                statusMessage = `
                    <div class="alert alert-danger py-2 mb-2">
                        ❌ Your claim was rejected.
                        ${claim.review_notes 
                            ? `<br><strong>Reason:</strong> ${claim.review_notes}` 
                            : ''}
                    </div>`;
            }

            // Build the proof files section
            // Shows thumbnails for images, links for other types
            let filesHTML = '';
            if (claim.proof_files && claim.proof_files.length > 0) {
                filesHTML = `
                    <div class="mt-3">
                        <strong>Your uploaded proof:</strong>
                        <div class="d-flex flex-wrap gap-2 mt-2">`;

                for (const file of claim.proof_files) {
                    if (file.media_type === 'image') {
                        filesHTML += `
                            <a href="/${file.file_url}" target="_blank">
                                <img 
                                    src="/${file.file_url}" 
                                    style="height:70px; width:70px; object-fit:cover; 
                                           border-radius:6px; border:1px solid #ccc;"
                                    title="Click to view"
                                >
                            </a>`;
                    } else {
                        const icon = file.media_type === 'video' ? '🎥' : '📄';
                        filesHTML += `
                            <a href="/${file.file_url}" target="_blank" 
                               class="btn btn-outline-secondary btn-sm">
                                ${icon} View ${file.media_type}
                            </a>`;
                    }
                }

                filesHTML += `</div></div>`;
            }

            html += `
                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">

                        <!-- Item title links back to the found item page -->
                        <a href="found-item-detail.html?id=${claim.found_id}" 
                           class="text-decoration-none text-dark fw-bold fs-6">
                            ${claim.item_title}
                        </a>

                        <span class="badge bg-${badgeColor[claim.claim_status] || 'secondary'}">
                            ${claim.claim_status}
                        </span>

                    </div>
                    <div class="card-body">

                        <p class="text-muted small mb-2">
                            Claim submitted: 
                            ${new Date(claim.claim_date).toLocaleString()}
                        </p>

                        <p class="text-muted small mb-3">
                            Found item current status: 
                            <strong>${claim.item_status}</strong>
                        </p>

                        ${statusMessage}
                        ${filesHTML}

                        <a href="found-item-detail.html?id=${claim.found_id}" 
                           class="btn btn-outline-success btn-sm mt-2">
                            View Item →
                        </a>

                    </div>
                </div>`;
        }

        container.innerHTML = html;

    } catch (err) {
        console.error(err);
        container.innerHTML = `
            <div class="alert alert-danger">
                Failed to load claims. Is your server running?
            </div>`;
    }
}


// ══════════════════════════════════════════════════════
// LOGOUT
// ══════════════════════════════════════════════════════
async function logout() {
    await fetch('/api/auth/logout', { 
        method: 'POST', 
        credentials: 'include' 
    });
    window.location.href = 'login.html';
}


// ══════════════════════════════════════════════════════
// START — Run as soon as the page loads
// ══════════════════════════════════════════════════════
loadMyClaims();

</script>
</body>
</html>
